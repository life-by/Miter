<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>বিদ্যুত বিল - ক্লাউড ডাটাবেস</title>

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b2b4f" />

    <!-- Inline Manifest -->
    <link rel="manifest" href='data:application/json,{"name":"বিদ্যুত বিল ডাটাবেস","short_name":"বিল ডাটাবেস","description":"বিদ্যুত বিল প্রদান ও গ্রাহক ডাটাবেস","start_url":"/Miter/","display":"standalone","background_color":"#f0f4f8","theme_color":"#0b2b4f","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Crect width=\'512\' height=\'512\' fill=\'%230b2b4f\'/%3E%3Ctext x=\'256\' y=\'340\' text-anchor=\'middle\' font-size=\'280\' fill=\'%23f5b042\' font-family=\'Arial\'%3E⚡%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"},{"src":"data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Crect width=\'512\' height=\'512\' fill=\'%230b2b4f\'/%3E%3Ctext x=\'256\' y=\'340\' text-anchor=\'middle\' font-size=\'280\' fill=\'%23f5b042\' font-family=\'Arial\'%3E⚡%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml","purpose":"any maskable"}]}' />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230b2b4f'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='280' fill='%23f5b042' font-family='Arial'%3E⚡%3C/text%3E%3C/svg%3E" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== রিসেট ও বেস ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #eef3f8 0%, #dce6ef 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 14px 12px 90px;
            color: #1a2a3a;
        }

        /* ===== গ্লাস মেইন কন্টেইনার ===== */
        .app-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 22px 18px;
            box-shadow:
                0 20px 60px rgba(11, 43, 79, 0.10),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.35);
            transition: all 0.3s ease;
        }

        /* ===== হেডার ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 2px solid rgba(11, 43, 79, 0.06);
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 800;
            color: #0b2b4f;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .header h1 i {
            color: #f5b042;
            font-size: clamp(20px, 4.5vw, 28px);
            filter: drop-shadow(0 2px 8px rgba(245, 176, 66, 0.3));
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-badge {
            padding: 8px 16px;
            border-radius: 60px;
            font-size: clamp(12px, 2.5vw, 14px);
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            min-height: 40px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .header-badge:active {
            transform: scale(0.94);
        }

        .badge-api {
            background: #f5b042;
            color: #0b2b4f;
        }

        .badge-api i {
            color: #0b2b4f;
        }

        .badge-db {
            background: #b13e4b;
            color: white;
            cursor: default;
        }

        .badge-db i {
            color: white;
        }

        .badge-db.online {
            background: #1d7a4f;
        }

        /* ===== PWA ইনস্টল সেকশন ===== */
        .pwa-install-section {
            background: linear-gradient(135deg, #0b2b4f 0%, #1a4a7a 100%);
            border-radius: 20px;
            padding: 16px 22px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            box-shadow: 0 8px 30px rgba(11, 43, 79, 0.25);
            animation: slideDown 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pwa-install-section.show {
            display: flex;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-24px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .pwa-install-text {
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }

        .pwa-install-text i {
            font-size: 30px;
            color: #f5b042;
            flex-shrink: 0;
        }

        .pwa-install-text .title {
            font-weight: 700;
            font-size: clamp(15px, 3.2vw, 18px);
        }

        .pwa-install-text .sub {
            font-size: clamp(11px, 2.2vw, 13px);
            opacity: 0.8;
        }

        .pwa-install-btn {
            background: #f5b042;
            color: #0b2b4f;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: clamp(14px, 2.8vw, 16px);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-height: 48px;
            box-shadow: 0 4px 20px rgba(245, 176, 66, 0.35);
        }

        .pwa-install-btn:active {
            transform: scale(0.94);
        }

        /* ===== স্ট্যাটস কার্ড ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 16px 18px;
            border-radius: 18px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 14px;
            border-left: 4px solid #0b2b4f;
            transition: all 0.2s ease;
        }

        .stat-card:active {
            transform: scale(0.98);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(11, 43, 79, 0.08);
            color: #0b2b4f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .stat-icon.green {
            background: rgba(29, 122, 79, 0.12);
            color: #1d7a4f;
        }

        .stat-info h3 {
            font-size: clamp(20px, 4.5vw, 26px);
            color: #0b2b4f;
            line-height: 1.1;
            font-weight: 800;
        }

        .stat-info p {
            font-size: clamp(11px, 2vw, 13px);
            color: #5a6f84;
            font-weight: 500;
        }

        /* ===== ট্যাব ===== */
        .tabs {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.04);
            padding: 5px;
            border-radius: 60px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: clamp(13px, 2.6vw, 15px);
            font-weight: 600;
            color: #4a6a8a;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: clamp(14px, 2.5vw, 17px);
        }

        .tab-btn.active {
            background: white;
            color: #0b2b4f;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .tab-btn:active {
            transform: scale(0.94);
        }

        .panel {
            display: none;
            animation: fadeUp 0.35s ease forwards;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== ফর্ম ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 22px 18px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: clamp(12px, 2.4vw, 14px);
            font-weight: 600;
            color: #1f3a57;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label i {
            color: #f5b042;
            width: 18px;
        }

        .form-group input {
            padding: 14px 16px;
            border: 2px solid rgba(11, 43, 79, 0.10);
            border-radius: 16px;
            outline: none;
            font-size: clamp(15px, 3vw, 17px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            min-height: 52px;
            -webkit-appearance: none;
            color: #1a2a3a;
        }

        .form-group input::placeholder {
            color: #8aa0b8;
        }

        .form-group input:focus {
            border-color: #0b2b4f;
            box-shadow: 0 0 0 4px rgba(11, 43, 79, 0.08);
            background: white;
        }

        .btn-primary {
            padding: 16px;
            background: linear-gradient(135deg, #0b2b4f, #1a4a7a);
            border: none;
            border-radius: 60px;
            font-size: clamp(16px, 3.2vw, 18px);
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 24px rgba(11, 43, 79, 0.20);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-primary:disabled {
            background: #8da0b8;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== সার্চ ও টেবিল ===== */
        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(11, 43, 79, 0.08);
            border-radius: 60px;
            outline: none;
            font-size: clamp(15px, 3vw, 17px);
            min-height: 52px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            color: #1a2a3a;
        }

        .search-box input::placeholder {
            color: #8aa0b8;
        }

        .search-box input:focus {
            border-color: #0b2b4f;
            box-shadow: 0 0 0 4px rgba(11, 43, 79, 0.06);
            background: white;
        }

        /* ===== টেবিল - ফিক্স: এক লাইনে ডাটা ===== */
        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 4px 2px;
            -webkit-overflow-scrolling: touch;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: clamp(12px, 2.4vw, 14px);
            min-width: 480px;
            table-layout: fixed;
        }

        th {
            background: rgba(11, 43, 79, 0.04);
            padding: 14px 12px;
            color: #1f3a57;
            font-size: clamp(11px, 2.2vw, 13px);
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* কলামের প্রস্থ ঠিক করে দেওয়া */
        th:nth-child(1), td:nth-child(1) { width: 8%; min-width: 40px; }
        th:nth-child(2), td:nth-child(2) { width: 28%; min-width: 100px; }
        th:nth-child(3), td:nth-child(3) { width: 28%; min-width: 90px; }
        th:nth-child(4), td:nth-child(4) { width: 24%; min-width: 100px; }
        th:nth-child(5), td:nth-child(5) { width: 12%; min-width: 80px; text-align: center; }

        td {
            padding: 12px 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            vertical-align: middle;
            overflow: hidden;
        }

        /* ===== সেল কন্টেন্ট - এক লাইনে ===== */
        .cell-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
            white-space: nowrap;
            width: 100%;
            min-width: 0;
        }

        .cell-inline .cell-text {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1 1 auto;
            min-width: 0;
            display: block;
        }

        .cell-inline .copy-btn {
            background: transparent;
            border: none;
            color: #2a6bb0;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: clamp(11px, 1.8vw, 13px);
            min-width: 28px;
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cell-inline .copy-btn:active {
            background: rgba(11, 43, 79, 0.08);
            transform: scale(0.88);
        }

        .cell-inline .copy-btn.copied {
            color: #1d7a4f;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            min-width: 36px;
            min-height: 36px;
            flex-shrink: 0;
        }

        .btn-icon:active {
            transform: scale(0.88);
        }

        .btn-edit {
            background: #2a6bb0;
        }
        .btn-delete {
            background: #b13e4b;
        }

        /* ===== মডাল ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 28px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-box h2 {
            font-size: clamp(20px, 4.5vw, 24px);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #0b2b4f;
        }

        .modal-box h2 i {
            color: #f5b042;
        }

        .modal-box label {
            font-size: clamp(12px, 2.4vw, 14px);
            font-weight: 600;
            color: #3a5a7a;
            margin-bottom: 4px;
            display: block;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 2px solid rgba(11, 43, 79, 0.08);
            border-radius: 14px;
            font-size: clamp(15px, 3vw, 17px);
            min-height: 48px;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            color: #1a2a3a;
        }

        .modal-box input:focus {
            border-color: #0b2b4f;
            box-shadow: 0 0 0 4px rgba(11, 43, 79, 0.06);
            outline: none;
        }

        .modal-box input:disabled {
            background: #eef2f7;
            color: #6a8aa8;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

        .modal-btns button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: clamp(14px, 2.8vw, 16px);
            min-height: 50px;
            transition: all 0.2s ease;
        }

        .modal-btns button:active {
            transform: scale(0.94);
        }

        .btn-save {
            background: #0b2b4f;
            color: white;
        }

        .btn-cancel {
            background: #e8edf2;
            color: #333;
        }

        /* ===== টোস্ট ===== */
        .toast-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0b2b4f;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            font-size: clamp(14px, 2.8vw, 16px);
            max-width: 92%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.20);
            pointer-events: none;
            font-weight: 500;
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-message.success {
            background: #1d7a4f;
        }
        .toast-message.error {
            background: #b13e4b;
        }

        /* ===== রেস্পন্সিভ ===== */
        @media (max-width: 700px) {
            table {
                min-width: 380px;
                font-size: 12px;
            }

            th:nth-child(2), td:nth-child(2) { width: 24%; min-width: 80px; }
            th:nth-child(3), td:nth-child(3) { width: 26%; min-width: 70px; }
            th:nth-child(4), td:nth-child(4) { width: 22%; min-width: 80px; }
            th:nth-child(5), td:nth-child(5) { width: 14%; min-width: 70px; }

            th, td {
                padding: 10px 8px;
            }

            .cell-inline .cell-text {
                font-size: 11px;
            }

            .btn-icon {
                width: 30px;
                height: 30px;
                min-width: 32px;
                min-height: 32px;
                font-size: 11px;
            }

            .cell-inline .copy-btn {
                min-width: 24px;
                min-height: 24px;
                font-size: 10px;
                padding: 2px 4px;
            }
        }

        @media (max-width: 500px) {
            table {
                min-width: 320px;
                font-size: 11px;
            }

            th:nth-child(1), td:nth-child(1) { width: 6%; min-width: 30px; }
            th:nth-child(2), td:nth-child(2) { width: 22%; min-width: 60px; }
            th:nth-child(3), td:nth-child(3) { width: 24%; min-width: 55px; }
            th:nth-child(4), td:nth-child(4) { width: 20%; min-width: 65px; }
            th:nth-child(5), td:nth-child(5) { width: 16%; min-width: 60px; }

            th, td {
                padding: 8px 5px;
            }

            .cell-inline .cell-text {
                font-size: 10px;
            }

            .cell-inline .copy-btn {
                min-width: 20px;
                min-height: 20px;
                font-size: 9px;
                padding: 1px 3px;
            }

            .btn-icon {
                width: 26px;
                height: 26px;
                min-width: 28px;
                min-height: 28px;
                font-size: 10px;
                border-radius: 8px;
            }

            .action-btns {
                gap: 4px;
            }
        }

        @media (max-width: 400px) {
            table {
                min-width: 280px;
                font-size: 10px;
            }

            th, td {
                padding: 6px 4px;
            }

            .cell-inline .cell-text {
                font-size: 9px;
            }

            .cell-inline .copy-btn {
                min-width: 18px;
                min-height: 18px;
                font-size: 8px;
                padding: 1px 2px;
            }

            .btn-icon {
                width: 22px;
                height: 22px;
                min-width: 24px;
                min-height: 24px;
                font-size: 8px;
            }
        }

        /* ===== ডার্ক মোড ===== */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #141d2b 0%, #0a121f 100%);
            }

            .app-container {
                background: rgba(26, 40, 60, 0.78);
                border-color: rgba(255, 255, 255, 0.06);
            }

            .header h1 {
                color: #e8edf2;
            }

            .header {
                border-bottom-color: rgba(255, 255, 255, 0.06);
            }

            .stat-card {
                background: rgba(30, 50, 75, 0.6);
                border-left-color: #f5b042;
            }

            .stat-info h3 {
                color: #e8edf2;
            }
            .stat-info p {
                color: #8aaccc;
            }
            .stat-icon {
                background: rgba(245, 176, 66, 0.12);
                color: #f5b042;
            }
            .stat-icon.green {
                background: rgba(29, 122, 79, 0.15);
                color: #5ad68a;
            }

            .tab-btn {
                color: #7a9abb;
            }
            .tab-btn.active {
                background: rgba(30, 50, 75, 0.7);
                color: #f5b042;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }

            .form-grid {
                background: rgba(30, 50, 75, 0.4);
                border-color: rgba(255, 255, 255, 0.05);
            }

            .form-group label {
                color: #b0c8dd;
            }
            .form-group label i {
                color: #f5b042;
            }

            .form-group input {
                background: rgba(20, 35, 55, 0.7);
                border-color: rgba(255, 255, 255, 0.08);
                color: #e8edf2;
            }
            .form-group input::placeholder {
                color: #5a7a9a;
            }
            .form-group input:focus {
                border-color: #f5b042;
                box-shadow: 0 0 0 4px rgba(245, 176, 66, 0.10);
                background: rgba(20, 35, 55, 0.9);
            }

            .btn-primary {
                background: linear-gradient(135deg, #1a3a6a, #2a5a8a);
                box-shadow: 0 4px 24px rgba(245, 176, 66, 0.08);
            }

            .search-box input {
                background: rgba(20, 35, 55, 0.6);
                border-color: rgba(255, 255, 255, 0.06);
                color: #e8edf2;
            }
            .search-box input::placeholder {
                color: #5a7a9a;
            }
            .search-box input:focus {
                border-color: #f5b042;
                box-shadow: 0 0 0 4px rgba(245, 176, 66, 0.08);
                background: rgba(20, 35, 55, 0.8);
            }

            .table-wrap {
                background: rgba(30, 50, 75, 0.3);
                border-color: rgba(255, 255, 255, 0.04);
            }

            th {
                background: rgba(245, 176, 66, 0.06);
                color: #b0c8dd;
            }
            td {
                border-bottom-color: rgba(255, 255, 255, 0.04);
                color: #c8dce8;
            }

            .cell-inline .copy-btn {
                color: #7ab0e8;
            }
            .cell-inline .copy-btn:active {
                background: rgba(255, 255, 255, 0.06);
            }
            .cell-inline .copy-btn.copied {
                color: #5ad68a;
            }

            .btn-edit {
                background: #2a6bb0;
            }
            .btn-delete {

            .badge-db {

            .badge-db.online {

            .badge-api {

            .modal-overlay {
                background: rgba(0, 0, 0, 0.7);
            }

            }

            .modal-box h2 {
                color: #e8edf2;
            }
            .modal-box h2 i {
                color: #f5b042;
            }

            .modal-box label {
                color: #9ab0c7;
            }
            .modal-box input {
                background: rgba(20, 35, 55, 0.7);
                border-color: rgba(255, 255, 255, 0.06);
                color: #e8edf2;
            }
            .modal-box input:focus {
                border-color: #f5b042;
                box-shadow: 0 0 0 4px rgba(245, 176, 66, 0.08);
            }
            .modal-box input:disabled {
                background: rgba(15, 30, 50, 0.6);
                color: #6a8aa8;

            .btn-save {

            .toast-message {
                background: #1f334a;
            }
            .toast-message.success {
                background: #1a6a3f;
            }
            .toast-message.error {

            }

            .pwa-install-section {
                background: linear-gradient(135deg, #1a2a4f 0%, #0f1f3a 100%);
            }

            .pwa-install-btn {
                background: #f5b042;
                color: #0b1a2f;
            }
        }

        /* ===== টাচ ফ্রেন্ডলি ===== */
        @media (hover: none) and (pointer: coarse) {
            .btn-icon,
            .copy-btn,
            .tab-btn,
            .header-badge,
            .btn-primary,
            .pwa-install-btn,
            .modal-btns button {
                cursor: default;
            }

            .btn-icon,
            .copy-btn {
                min-width: 40px;
                min-height: 40px;
            }

            .tab-btn {
                min-height: 48px;
            }

            .header-badge {
                min-height: 40px;
            }

            .btn-primary {
                min-height: 56px;
            }

            .pwa-install-btn {
                min-height: 50px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ===== হেডার ===== -->
        <div class="header">
            <h1><i class="fas fa-bolt"></i> বিদ্যুত বিল</h1>
            <div class="header-actions">
                <button id="settingsBtn" class="header-badge badge-api"><i class="fas fa-cog"></i> API</button>
                <span class="header-badge badge-db" id="dbStatus"><i class="fas fa-times-circle"></i> অফলাইন</span>
            </div>
        </div>

        <!-- ===== PWA ইনস্টল ===== -->
        <div id="pwaInstallSection" class="pwa-install-section">
            <div class="pwa-install-text">
                <i class="fas fa-mobile-alt"></i>
                <div>
                    <span class="title">অ্যাপ ইনস্টল করুন</span>
                    <span class="sub">দ্রুত অ্যাক্সেস ও অফলাইন সুবিধা</span>
                </div>
            </div>
            <button id="pwaInstallBtn" class="pwa-install-btn">
                <i class="fas fa-download"></i> ইনস্টল
            </button>
        </div>

        <!-- ===== ড্যাশবোর্ড ===== -->
        <div class="stats-grid" id="dashboardStats" style="display: none;">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p>মোট গ্রাহক</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-user-plus"></i></div>
                <div class="stat-info">
                    <h3 id="latestUser" style="font-size:clamp(14px, 3vw, 18px);">নেই</h3>
                    <p>সর্বশেষ</p>
                </div>
            </div>
        </div>

        <!-- ===== ট্যাব ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="tabForm"><i class="fas fa-plus-circle"></i> নতুন</button>
            <button class="tab-btn" data-tab="tabSearch"><i class="fas fa-database"></i> ডাটাবেস</button>
        </div>

        <!-- ===== ফর্ম প্যানেল ===== -->
        <div id="tabForm" class="panel active">
            <form id="billForm" class="form-grid">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> মিটার কার্ড নম্বর</label>
                    <input type="text" id="meterCard" placeholder="যেমন: MET-001" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> গ্রাহকের নাম</label>
                    <input type="text" id="customerName" placeholder="পূর্ণ নাম লিখুন" required autocomplete="off" />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> ফোন নম্বর</label>
                    <input type="tel" id="phoneNumber" placeholder="017XXXXXXXX" required autocomplete="off" inputmode="numeric" />
                </div>
                <button type="submit" id="submitBtn" class="btn-primary"><i class="fas fa-cloud-upload-alt"></i> ক্লাউডে সেভ করুন</button>
            </form>
        </div>

        <!-- ===== ডাটাবেস প্যানেল ===== -->
        <div id="tabSearch" class="panel">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 খুঁজুন (মিটার, নাম বা ফোন)..." autocomplete="off" />
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>মিটার কার্ড</th>
                            <th>নাম</th>
                            <th>ফোন</th>
                            <th style="text-align:center;">একশন</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <tr><td colspan="5" style="text-align:center;padding:40px;color:#8aa0b8;">ডাটা লোড হচ্ছে...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== API মডাল ===== -->
    <div id="apiModal" class="modal-overlay">
        <div class="modal-box">
            <h2><i class="fas fa-cloud"></i> GitHub সেটআপ</h2>
            <input type="text" id="ghUsername" placeholder="GitHub Username" />
            <input type="text" id="ghRepo" placeholder="Repository Name" />
            <input type="password" id="ghToken" placeholder="Token (ghp_...)" />
            <div class="modal-btns">
                <button id="closeApiBtn" class="btn-cancel">বন্ধ</button>
                <button id="saveApiBtn" class="btn-save">সেভ</button>
            </div>
        </div>
    </div>

    <!-- ===== এডিট মডাল ===== -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h2><i class="fas fa-edit"></i> ডাটা আপডেট</h2>
            <input type="hidden" id="editOriginalMeter" />
            <label>মিটার কার্ড (পরিবর্তনযোগ্য নয়)</label>
            <input type="text" id="editMeter" disabled style="background:#eef2f7;" />
            <label>নাম</label>
            <input type="text" id="editName" />
            <label>ফোন</label>
            <input type="text" id="editPhone" />
            <div class="modal-btns">
                <button id="closeEditBtn" class="btn-cancel">বাতিল</button>
                <button id="saveEditBtn" class="btn-save">আপডেট</button>
            </div>
        </div>
    </div>

    <!-- ===== টোস্ট ===== -->
    <div id="toast" class="toast-message"></div>

    <script>
        (function() {
            // ===== ভেরিয়েবল =====
            let cloudData = [];
            let githubSha = "";

            // ===== DOM রেফারেন্স =====
            const form = document.getElementById('billForm');
            const submitBtn = document.getElementById('submitBtn');
            const tbody = document.getElementById('dataTableBody');
            const apiModal = document.getElementById('apiModal');
            const editModal = document.getElementById('editModal');
            const toast = document.getElementById('toast');
            const dbStatus = document.getElementById('dbStatus');
            const statGrid = document.getElementById('dashboardStats');
            const statTotal = document.getElementById('totalUsers');
            const statLatest = document.getElementById('latestUser');

            // ===== PWA ইনস্টল =====
            let deferredPrompt;
            const pwaSection = document.getElementById('pwaInstallSection');
            const pwaBtn = document.getElementById('pwaInstallBtn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                pwaSection.classList.add('show');
            });

            pwaBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    try {
                        const result = await deferredPrompt.prompt();
                        if (result.outcome === 'accepted') {
                            showToast('অ্যাপ ইনস্টল হয়েছে! 🎉', 'success');
                            pwaSection.classList.remove('show');
                        }
                        deferredPrompt = null;
                    } catch (err) {
                        showToast('ইনস্টল করতে সমস্যা!', 'error');
                    }
                } else {
                    showToast('"Add to Home Screen" ব্যবহার করুন', 'success');
                }
            });

            window.addEventListener('appinstalled', () => {
                showToast('অ্যাপ সফলভাবে ইনস্টল হয়েছে! 🎉', 'success');
                pwaSection.classList.remove('show');
            });

            // ===== টোস্ট =====
            function showToast(msg, type = 'success') {
                toast.textContent = msg;
                toast.className = 'toast-message ' + type;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // ===== কপি =====
            function copyToClipboard(text, element) {
                const copy = async () => {
                    try {
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(text);
                        } else {
                            const ta = document.createElement('textarea');
                            ta.value = text;
                            ta.style.position = 'fixed';
                            ta.style.opacity = '0';
                            ta.style.left = '-9999px';
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            document.body.removeChild(ta);
                        }
                        element.classList.add('copied');
                        element.innerHTML = '<i class="fas fa-check"></i>';
                        showToast('কপি হয়েছে!', 'success');
                        setTimeout(() => {
                            element.classList.remove('copied');
                            element.innerHTML = '<i class="fas fa-copy"></i>';
                        }, 2000);
                    } catch (err) {
                        showToast('কপি করা সম্ভব হয়নি', 'error');
                    }
                };
                copy();
            }
            window.copyToClipboard = copyToClipboard;

            // ===== ড্যাশবোর্ড =====
            function updateDashboard() {
                statGrid.style.display = 'grid';
                statTotal.innerText = cloudData.length;
                statLatest.innerText = cloudData.length > 0 ? cloudData[cloudData.length - 1].name : 'নেই';
            }

            // ===== টেবিল রেন্ডার =====
            function renderTable(filter = '') {
                updateDashboard();
                let items = [...cloudData];
                const term = filter.trim().toLowerCase();

                if (term) {
                    items = items.filter(item =>
                        item.meter.toLowerCase().includes(term) ||
                        item.name.toLowerCase().includes(term) ||
                        item.phone.includes(term)
                    );
                }

                if (items.length === 0) {
                    tbody.innerHTML =
                        `<tr><td colspan="5" style="text-align:center;padding:40px;color:#8aa0b8;">কোনো রেকর্ড পাওয়া যায়নি</td></tr>`;
                    return;
                }

                // ডাটা দেখানোর সময় প্রতিটি ডাটা এস্কেপ করা
                const escapeHtml = (str) => {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                };

                tbody.innerHTML = items.map((item, idx) => {
                    const meterEsc = escapeHtml(item.meter);
                    const nameEsc = escapeHtml(item.name);
                    const phoneEsc = escapeHtml(item.phone);

                    return `
                            <tr>
                                <td><strong>${idx + 1}</strong></td>
                                <td>
                                    <div class="cell-inline">
                                        <span class="cell-text" title="${meterEsc}">${meterEsc}</span>
                                        <button class="copy-btn" onclick="copyToClipboard('${meterEsc.replace(/'/g, "\\'")}', this)" title="কপি">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                </td>
                                <td>
                                    <div class="cell-inline">
                                        <span class="cell-text" title="${nameEsc}">${nameEsc}</span>
                                    </div>
                                </td>
                                <td>
                                    <div class="cell-inline">
                                        <span class="cell-text" title="${phoneEsc}">${phoneEsc}</span>
                                        <button class="copy-btn" onclick="copyToClipboard('${phoneEsc.replace(/'/g, "\\'")}', this)" title="কপি">
                                            <i class="fas fa-copy"></i>
                                        </button>
                                    </div>
                                </td>
                                <td style="text-align:center;">
                                    <div class="action-btns">
                                        <button class="btn-icon btn-edit" onclick="openEdit('${meterEsc.replace(/'/g, "\\'")}')" title="এডিট"><i class="fas fa-pen"></i></button>
                                        <button class="btn-icon btn-delete" onclick="deleteRecord('${meterEsc.replace(/'/g, "\\'")}')" title="ডিলিট"><i class="fas fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `;
                }).join('');
            }

            // ===== GitHub সিঙ্ক =====
            async function syncWithGitHub(newArray, commitMessage) {
                const config = JSON.parse(localStorage.getItem('gh_api_config'));
                if (!config || !config.token) {
                    showToast('API সেটআপ নেই!', 'error');
                    return false;
                }

                const apiUrl = `https://api.github.com/repos/${config.user}/${config.repo}/contents/data.json`;
                const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(newArray, null, 2))));

                try {
                    const putRes = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${config.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: commitMessage,
                            content: contentBase64,
                            sha: githubSha || undefined
                        })
                    });

                    if (putRes.ok) {
                        const resData = await putRes.json();
                        githubSha = resData.content.sha;
                        cloudData = newArray;
                        renderTable(document.getElementById('searchInput').value);
                        return true;
                    } else {
                        const errData = await putRes.json();
                        showToast(`GitHub এরর: ${errData.message || 'অজানা ত্রুটি'}`, 'error');
                    }
                } catch (error) {
                    showToast('নেটওয়ার্ক সমস্যা!', 'error');
                }
                return false;
            }

            // ===== ডাটা লোড =====
            async function loadData() {
                const config = JSON.parse(localStorage.getItem('gh_api_config'));
                if (!config || !config.token) {
                    dbStatus.innerHTML = `<i class="fas fa-exclamation-triangle"></i> API নেই`;
                    dbStatus.className = 'header-badge badge-db';
                    tbody.innerHTML =
                        `<tr><td colspan="5" style="text-align:center;padding:40px;color:#8aa0b8;">API সেটআপ করুন</td></tr>`;
                    return;
                }

                try {
                    const res = await fetch(
                        `https://api.github.com/repos/${config.user}/${config.repo}/contents/data.json`, {
                            headers: { 'Authorization': `Bearer ${config.token}` }
                        }
                    );

                    if (res.ok) {
                        const data = await res.json();
                        githubSha = data.sha;
                        cloudData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                        dbStatus.innerHTML = `<i class="fas fa-cloud"></i> কানেক্টেড`;
                        dbStatus.className = 'header-badge badge-db online';
                        renderTable();
                    } else if (res.status === 404) {
                        cloudData = [];
                        renderTable();
                        dbStatus.innerHTML = `<i class="fas fa-cloud"></i> কানেক্টেড`;
                        dbStatus.className = 'header-badge badge-db online';
                    } else {
                        dbStatus.innerHTML = `<i class="fas fa-times"></i> এরর`;
                        dbStatus.className = 'header-badge badge-db';
                    }
                } catch (e) {
                    dbStatus.innerHTML = `<i class="fas fa-times"></i> এরর`;
                    dbStatus.className = 'header-badge badge-db';
                    showToast('নেটওয়ার্ক সমস্যা!', 'error');
                }
            }

            // ===== ফর্ম =====
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> সেভ হচ্ছে...';

                const newItem = {
                    meter: document.getElementById('meterCard').value.trim(),
                    name: document.getElementById('customerName').value.trim(),
                    phone: document.getElementById('phoneNumber').value.trim()
                };

                if (!newItem.meter || !newItem.name || !newItem.phone) {
                    showToast('সব ফিল্ড পূরণ করুন!', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ক্লাউডে সেভ করুন';
                    return;
                }

                if (cloudData.some(d => d.meter.toLowerCase() === newItem.meter.toLowerCase())) {
                    showToast('এই মিটার নম্বর ইতিমধ্যে আছে!', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ক্লাউডে সেভ করুন';
                    return;
                }

                const updatedArray = [...cloudData, newItem];
                const success = await syncWithGitHub(updatedArray, `Added ${newItem.name}`);

                if (success) {
                    showToast('ডাটা সেভ হয়েছে!');
                    form.reset();
                    document.getElementById('meterCard').focus();
                }

                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ক্লাউডে সেভ করুন';
            });

            // ===== ডিলিট =====
            window.deleteRecord = async function(meter) {
                if (!confirm(`"${meter}" রেকর্ডটি ডিলিট করবেন?`)) return;
                const updatedArray = cloudData.filter(d => d.meter !== meter);
                const success = await syncWithGitHub(updatedArray, `Deleted ${meter}`);
                if (success) showToast('ডিলিট হয়েছে!');
            };

            // ===== এডিট =====
            window.openEdit = function(meter) {
                const item = cloudData.find(d => d.meter === meter);
                if (!item) return;

                document.getElementById('editOriginalMeter').value = item.meter;
                document.getElementById('editMeter').value = item.meter;
                document.getElementById('editName').value = item.name;
                document.getElementById('editPhone').value = item.phone;
                editModal.style.display = 'flex';
            };

            document.getElementById('saveEditBtn').addEventListener('click', async () => {
                const meter = document.getElementById('editOriginalMeter').value;
                const newName = document.getElementById('editName').value.trim();
                const newPhone = document.getElementById('editPhone').value.trim();

                if (!newName || !newPhone) {
                    showToast('নাম ও ফোন পূরণ করুন!', 'error');
                    return;
                }

                const updatedArray = cloudData.map(d => {
                    if (d.meter === meter) return { meter, name: newName, phone: newPhone };
                    return d;
                });

                document.getElementById('saveEditBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> আপডেট...';
                const success = await syncWithGitHub(updatedArray, `Updated ${meter}`);

                if (success) {
                    showToast('আপডেট হয়েছে!');
                    editModal.style.display = 'none';
                }
                document.getElementById('saveEditBtn').innerHTML = 'আপডেট';
            });

            // ===== ইভেন্ট =====
            document.getElementById('closeEditBtn').addEventListener('click', () => editModal.style.display = 'none');
            document.getElementById('searchInput').addEventListener('input', (e) => renderTable(e.target.value));
            document.getElementById('settingsBtn').addEventListener('click', () => apiModal.style.display = 'flex');
            document.getElementById('closeApiBtn').addEventListener('click', () => apiModal.style.display = 'none');

            document.getElementById('saveApiBtn').addEventListener('click', () => {
                const user = document.getElementById('ghUsername').value.trim();
                const repo = document.getElementById('ghRepo').value.trim();
                const token = document.getElementById('ghToken').value.trim();

                if (!user || !repo || !token) {
                    showToast('সব ফিল্ড পূরণ করুন!', 'error');
                    return;
                }

                localStorage.setItem('gh_api_config', JSON.stringify({ user, repo, token }));
                apiModal.style.display = 'none';
                showToast('API সেটআপ সম্পন্ন!', 'success');
                loadData();
            });

            // ===== ট্যাব =====
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn, .panel').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.tab).classList.add('active');
                });
            });

            // ===== লোড =====
            window.addEventListener('load', loadData);

            // ===== Service Worker =====
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(() => console.log('SW Registration failed'));
            }

            // ===== কীবোর্ড শর্টকাট: Escape দিয়ে মডাল বন্ধ =====
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    apiModal.style.display = 'none';
                    editModal.style.display = 'none';
                }
            });

            // ===== মডালের বাইরে ক্লিক করলে বন্ধ =====
            apiModal.addEventListener('click', (e) => {
                if (e.target === apiModal) apiModal.style.display = 'none';
            });
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) editModal.style.display = 'none';
            });

        })();
    </script>

</body>
</html>
