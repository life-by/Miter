<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>বিদ্যুত বিল · ক্লাউড সিস্টেম</title>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a1628" />

  <link rel="manifest" href='data:application/json,{"name":"বিদ্যুত বিল ডাটাবেস","short_name":"বিল ডাটাবেস","description":"বিদ্যুত বিল প্রদান ও গ্রাহক ডাটাবেস ম্যানেজমেন্ট","start_url":"/Miter/","display":"standalone","background_color":"#f1f5f9","theme_color":"#0a1628","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\'%3E%3Crect width=\'512\' height=\'512\' fill=\'%230a1628\'/%3E%3Ctext x=\'256\' y=\'340\' text-anchor=\'middle\' font-size=\'280\' fill=\'%23fbbf24\' font-family=\'Arial\'%3E⚡%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml","purpose":"any maskable"}]}' />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230a1628'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='280' fill='%23fbbf24' font-family='Arial'%3E⚡%3C/text%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface-hover: #f8fafc;
      --border: #e2e8f0;
      --primary: #0a1628;
      --primary-light: #1a2a44;
      --accent: #f59e0b;
      --accent-light: #fbbf24;
      --accent-bg: #fffbeb;
      --success: #059669;
      --success-bg: #ecfdf5;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --purple: #7c3aed;
      --purple-bg: #f5f3ff;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --surface-hover: #2d3a4f;
        --border: #334155;
        --primary: #f1f5f9;
        --primary-light: #e2e8f0;
        --text: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
        --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
        --accent-bg: #1e293b;
        --success-bg: #1e293b;
        --danger-bg: #1e293b;
        --purple-bg: #1e293b;
      }
    }

    body {
      font-family: 'Inter', 'Hind Siliguri', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 100px;
      transition: background 0.3s;
      line-height: 1.6;
    }

    .app {
      max-width: 1140px;
      width: 100%;
    }

    /* HEADER */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding: 20px 24px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .app-header .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .app-header .brand .icon {
      width: 44px;
      height: 44px;
      background: var(--accent-bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .app-header .brand h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .app-header .brand h1 span {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-ghost {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ghost:hover {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .btn-ghost.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a1628;
    }

    .btn-ghost.accent:hover {
      opacity: 0.9;
      transform: scale(0.97);
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
    }

    .status-badge.online {
      background: var(--success-bg);
      border-color: var(--success);
      color: var(--success);
    }

    .status-badge.offline {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: var(--danger);
    }

    .status-badge.loading {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* PWA */
    .pwa-banner {
      background: linear-gradient(135deg, #0a1628 0%, #1a2a44 100%);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: var(--shadow-md);
      animation: slideDown 0.4s ease;
    }

    .pwa-banner.show {
      display: flex;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pwa-banner .info {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
    }

    .pwa-banner .info i {
      font-size: 28px;
      color: var(--accent);
    }

    .pwa-banner .info .title {
      font-weight: 700;
      font-size: 15px;
    }

    .pwa-banner .info .sub {
      font-size: 12px;
      opacity: 0.7;
    }

    .pwa-banner .btn-install {
      background: var(--accent);
      color: #0a1628;
      border: none;
      padding: 10px 24px;
      border-radius: var(--radius-full);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
    }

    .pwa-banner .btn-install:hover {
      transform: scale(0.96);
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      padding: 18px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .stat-card .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .stat-card:nth-child(1) .stat-icon {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .stat-card:nth-child(2) .stat-icon {
      background: var(--success-bg);
      color: var(--success);
    }

    .stat-card:nth-child(3) .stat-icon {
      background: var(--purple-bg);
      color: var(--purple);
    }

    .stat-card .stat-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .stat-card .stat-info p {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* TABS */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      background: var(--surface);
      padding: 6px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1 1 auto;
      min-width: 90px;
      padding: 12px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab-btn i {
      font-size: 15px;
    }

    .tab-btn:hover {
      color: var(--text-secondary);
      background: var(--surface-hover);
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .tab-btn.active i {
      color: var(--accent);
    }

    .panel {
      display: none;
      animation: fadeUp 0.3s ease;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* FORMS */
    .form-card {
      background: var(--surface);
      padding: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .form-card .form-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-card .form-title i {
      color: var(--accent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 24px;
    }

    .form-grid .full-width {
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-group label i {
      color: var(--text-muted);
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .search-box input {
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      transition: var(--transition);
      font-family: inherit;
      width: 100%;
    }

    .form-group input:focus,
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
      background: var(--surface);
    }

    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      padding: 13px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary.accent {
      background: var(--accent);
      color: #0a1628;
    }

    .btn-primary.success {
      background: var(--success);
    }

    .btn-primary.purple {
      background: var(--purple);
    }

    .btn-primary.danger {
      background: var(--danger);
    }

    /* VIEW SWITCHER */
    .view-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .view-btn {
      padding: 8px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }

    .view-btn:hover {
      background: var(--surface-hover);
    }

    .view-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      border-radius: var(--radius-full);
      padding: 12px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
    }

    .search-box input:focus {
      background: var(--surface);
    }

    /* TABLE */
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: var(--bg);
    }

    th {
      padding: 14px 18px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1.5px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--surface-hover);
    }

    .cell-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .copy-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: var(--surface-hover);
      border-color: var(--text-muted);
    }

    .copy-btn.copied {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .action-btns {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: none;
      color: #fff;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .btn-icon:hover {
      transform: scale(0.92);
    }

    .btn-edit {
      background: var(--accent);
    }

    .btn-delete {
      background: var(--danger);
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-box {
      background: var(--surface);
      padding: 32px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-box h2 {
      font-size: 20px;
      margin-bottom: 22px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-box label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }

    .modal-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 16px;
      transition: var(--transition);
    }

    .modal-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-btns button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: var(--transition);
    }

    .modal-btns .btn-save {
      background: var(--primary);
      color: #fff;
    }

    .modal-btns .btn-save:hover {
      opacity: 0.9;
    }

    .modal-btns .btn-cancel {
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .modal-btns .btn-cancel:hover {
      background: var(--surface-hover);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 14px 28px;
      border-radius: var(--radius-full);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 9999;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-lg);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      body {
        padding: 12px 10px 80px;
      }

      .app-header {
        padding: 16px 18px;
        border-radius: var(--radius-sm);
      }

      .app-header .brand h1 {
        font-size: 18px;
      }

      .app-header .brand .icon {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .stat-card {
        padding: 14px 16px;
        flex-direction: column;
        text-align: center;
        gap: 6px;
      }

      .stat-card .stat-icon {
        width: 40px;
        height: 40px;
        font-size: 17px;
      }

      .stat-card .stat-info h3 {
        font-size: 18px;
      }

      .tabs {
        gap: 4px;
        padding: 4px;
        border-radius: var(--radius-sm);
      }

      .tab-btn {
        min-width: 60px;
        padding: 10px 12px;
        font-size: 12px;
        border-radius: 8px;
      }

      .tab-btn span {
        display: none;
      }

      .tab-btn i {
        font-size: 18px;
      }

      .form-card {
        padding: 18px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .form-grid .full-width {
        grid-column: 1;
      }

      .table-wrap {
        border-radius: var(--radius-sm);
      }

      .table-scroll {
        overflow-x: auto;
      }

      /* Mobile card view for table */
      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
        width: 100%;
      }

      thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
      }

      tr {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        margin-bottom: 12px;
        padding: 4px 0;
      }

      td {
        border: none;
        padding: 10px 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        border-bottom: 1px dashed var(--border);
      }

      td:last-child {
        border-bottom: none;
        align-items: flex-end;
      }

      td::before {
        content: attr(data-label);
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .cell-content {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .action-btns {
        width: 100%;
        justify-content: flex-end;
      }

      .modal-box {
        padding: 24px 20px;
      }

      .pwa-banner {
        flex-direction: column;
        align-items: flex-start;
        padding: 14px 18px;
      }

      .pwa-banner .btn-install {
        width: 100%;
        justify-content: center;
      }

      .view-bar {
        gap: 6px;
      }

      .view-btn {
        padding: 6px 14px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .stats {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .stat-card {
        padding: 12px;
      }

      .stat-card .stat-info h3 {
        font-size: 16px;
      }

      .stat-card .stat-info p {
        font-size: 11px;
      }

      .header-actions .btn-ghost span {
        display: none;
      }

      .status-badge span {
        display: none;
      }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <div class="icon"><i class="fas fa-bolt"></i></div>
      <h1>বিদ্যুত<span>বিল</span></h1>
    </div>
    <div class="header-actions">
      <button id="settingsBtn" class="btn-ghost"><i class="fas fa-key"></i> <span>API</span></button>
      <span class="status-badge loading" id="dbStatus"><i class="fas fa-circle-notch fa-spin"></i> <span>লোড...</span></span>
    </div>
  </header>

  <!-- PWA BANNER -->
  <div id="pwaBanner" class="pwa-banner">
    <div class="info">
      <i class="fas fa-mobile-screen"></i>
      <div>
        <div class="title">অ্যাপ ইনস্টল করুন</div>
        <div class="sub">অফলাইন ও দ্রুত অ্যাক্সেস পেতে</div>
      </div>
    </div>
    <button id="pwaInstallBtn" class="btn-install"><i class="fas fa-download"></i> ইনস্টল</button>
  </div>

  <!-- STATS -->
  <div class="stats" id="dashboardStats" style="display:none;">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-bolt"></i></div>
      <div class="stat-info">
        <h3 id="statTotalMeters">0</h3>
        <p>মোট মিটার</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-building"></i></div>
      <div class="stat-info">
        <h3 id="statTotalCompanies">0</h3>
        <p>কোম্পানি</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-wallet"></i></div>
      <div class="stat-info">
        <h3 id="statTotalTx">৳0</h3>
        <p>আজকের লেনদেন</p>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tabMeter"><i class="fas fa-plus-circle"></i> <span>মিটার</span></button>
    <button class="tab-btn" data-tab="tabCompany"><i class="fas fa-building"></i> <span>কোম্পানি</span></button>
    <button class="tab-btn" data-tab="tabBkash"><i class="fas fa-wallet"></i> <span>বিকাশ</span></button>
    <button class="tab-btn" data-tab="tabDatabase"><i class="fas fa-database"></i> <span>ডাটাবেস</span></button>
  </div>

  <!-- PANEL: METER -->
  <div id="tabMeter" class="panel active">
    <div class="form-card">
      <div class="form-title"><i class="fas fa-bolt"></i> নতুন মিটার যোগ</div>
      <form id="meterForm" class="form-grid">
        <div class="form-group full-width">
          <label><i class="far fa-id-card"></i> মিটার কার্ড নম্বর</label>
          <input type="text" id="meterCard" placeholder="যেমন: 0175168245..." required autocomplete="off" />
        </div>
        <div class="form-group">
          <label><i class="far fa-user"></i> গ্রাহকের নাম</label>
          <input type="text" id="customerName" placeholder="পূর্ণ নাম" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-phone"></i> ফোন নম্বর</label>
          <input type="tel" id="phoneNumber" placeholder="017XXXXXXXX" required autocomplete="off" inputmode="numeric" />
        </div>
        <div class="full-width">
          <button type="submit" id="submitMeterBtn" class="btn-primary accent"><i class="fas fa-cloud-upload-alt"></i> ডাটাবেসে সেভ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PANEL: COMPANY -->
  <div id="tabCompany" class="panel">
    <div class="form-card">
      <div class="form-title"><i class="fas fa-building" style="color:var(--success);"></i> কোম্পানি / SR যোগ</div>
      <form id="companyForm" class="form-grid">
        <div class="form-group full-width">
          <label><i class="fas fa-store"></i> কোম্পানির নাম</label>
          <input type="text" id="compName" placeholder="যেমন: প্রাণ, স্কয়ার" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-user-tie"></i> SR এর নাম</label>
          <input type="text" id="srName" placeholder="SR এর নাম" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-phone"></i> SR এর ফোন</label>
          <input type="tel" id="srPhone" placeholder="01XXXXXXXXX" required autocomplete="off" inputmode="numeric" />
        </div>
        <div class="full-width">
          <button type="submit" id="submitCompBtn" class="btn-primary success"><i class="fas fa-cloud-upload-alt"></i> কোম্পানি সেভ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PANEL: BKASH -->
  <div id="tabBkash" class="panel">
    <div class="form-card">
      <div class="form-title"><i class="fas fa-wallet" style="color:var(--purple);"></i> বিকাশ লেনদেন</div>
      <form id="bkashForm" class="form-grid">
        <div class="form-group full-width">
          <label><i class="far fa-calendar-alt"></i> তারিখ</label>
          <input type="date" id="bkashDate" required />
        </div>
        <div class="form-group">
          <label><i class="fas fa-arrow-down" style="color:var(--success);"></i> SR থেকে নিছি (In)</label>
          <input type="number" id="bkashIn" placeholder="0" value="0" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-arrow-up" style="color:var(--danger);"></i> SR কে দিছি (Out)</label>
          <input type="number" id="bkashOut" placeholder="0" value="0" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-handshake"></i> কাস্টমার Tx</label>
          <input type="number" id="bkashCus" placeholder="0" value="0" />
        </div>
        <div class="form-group full-width">
          <label><i class="fas fa-pen"></i> নোট / মন্তব্য</label>
          <input type="text" id="bkashNote" placeholder="বিস্তারিত..." autocomplete="off" />
        </div>
        <div class="full-width">
          <button type="submit" id="submitBkashBtn" class="btn-primary purple"><i class="fas fa-cloud-upload-alt"></i> লেনদেন সেভ করুন</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PANEL: DATABASE -->
  <div id="tabDatabase" class="panel">
    <div class="view-bar">
      <button class="view-btn active" data-view="meter">মিটার বিল</button>
      <button class="view-btn" data-view="company">কোম্পানি</button>
      <button class="view-btn" data-view="bkash">বিকাশ</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 খুঁজুন (নাম, ফোন, মিটার...)" autocomplete="off" />
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead id="tableHead">
            <tr><th colspan="6">লোড হচ্ছে...</th></tr>
          </thead>
          <tbody id="dataTableBody">
            <tr><td colspan="6" class="empty-state"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>ডাটা লোড হচ্ছে...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- API MODAL -->
<div id="apiModal" class="modal-overlay">
  <div class="modal-box">
    <h2><i class="fab fa-github" style="color:var(--accent);"></i> GitHub API</h2>
    <label>ইউজারনেম</label>
    <input type="text" id="ghUsername" placeholder="mdaliraza" />
    <label>রিপোজিটরি</label>
    <input type="text" id="ghRepo" placeholder="my-database" />
    <label>Personal Access Token</label>
    <input type="password" id="ghToken" placeholder="ghp_..." />
    <div class="modal-btns">
      <button id="closeApiBtn" class="btn-cancel">বন্ধ</button>
      <button id="saveApiBtn" class="btn-save"><i class="fas fa-save"></i> সেভ</button>
    </div>
  </div>
</div>

<!-- EDIT METER MODAL -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box">
    <h2><i class="fas fa-pen-square" style="color:var(--accent);"></i> মিটার আপডেট</h2>
    <input type="hidden" id="editOriginalMeter" />
    <label>মিটার কার্ড</label>
    <input type="text" id="editMeter" disabled />
    <label>গ্রাহকের নাম</label>
    <input type="text" id="editName" />
    <label>ফোন নম্বর</label>
    <input type="text" id="editPhone" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('editModal').style.display='none'">বাতিল</button>
      <button id="saveEditBtn" class="btn-save"><i class="fas fa-save"></i> আপডেট</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
  (function() {
    'use strict';

    let cloudData = [];
    let githubSha = "";
    let currentView = 'meter';

    const toast = document.getElementById('toast');
    const dbStatus = document.getElementById('dbStatus');
    const tbody = document.getElementById('dataTableBody');
    const thead = document.getElementById('tableHead');
    const searchInput = document.getElementById('searchInput');

    // PWA
    let deferredPrompt;
    const pwaBanner = document.getElementById('pwaBanner');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      pwaBanner.classList.add('show');
    });
    document.getElementById('pwaInstallBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        await deferredPrompt.prompt();
        deferredPrompt = null;
        pwaBanner.classList.remove('show');
      }
    });
    window.addEventListener('appinstalled', () => pwaBanner.classList.remove('show'));

    // Toast
    function showToast(msg, type = 'success') {
      toast.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${msg}` : `<i class="fas fa-exclamation-circle"></i> ${msg}`;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 3200);
    }

    // Clipboard
    window.copyToClipboard = function(text, element) {
      navigator.clipboard.writeText(text).then(() => {
        const oldHTML = element.innerHTML;
        element.classList.add('copied');
        element.innerHTML = '<i class="fas fa-check"></i>';
        setTimeout(() => {
          element.classList.remove('copied');
          element.innerHTML = oldHTML;
        }, 2000);
      }).catch(() => showToast('কপি ব্যর্থ', 'error'));
    };

    // GitHub sync
    async function syncWithGitHub(newArray, commitMessage) {
      const config = JSON.parse(localStorage.getItem('gh_api_config'));
      if (!config || !config.token) {
        showToast('API সেটআপ করুন', 'error');
        return false;
      }
      const apiUrl = `https://api.github.com/repos/${config.user}/${config.repo}/contents/data.json`;
      const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(newArray, null, 2))));
      try {
        const putRes = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${config.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: commitMessage,
            content: contentBase64,
            sha: githubSha || undefined
          })
        });
        if (putRes.ok) {
          const resData = await putRes.json();
          githubSha = resData.content.sha;
          cloudData = newArray;
          renderTable(searchInput.value);
          updateDashboard();
          return true;
        } else {
          const err = await putRes.json();
          showToast(`GitHub: ${err.message || 'error'}`, 'error');
        }
      } catch (e) {
        showToast('Network error', 'error');
      }
      return false;
    }

    // Load data
    async function loadData() {
      const config = JSON.parse(localStorage.getItem('gh_api_config'));
      if (!config || !config.token) {
        dbStatus.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span>API নেই</span>`;
        dbStatus.className = 'status-badge offline';
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><i class="fas fa-key fa-2x" style="color:var(--accent);"></i><br><br>API সেটআপ করুন</td></tr>`;
        return;
      }
      try {
        dbStatus.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> <span>লোড...</span>`;
        dbStatus.className = 'status-badge loading';
        const res = await fetch(`https://api.github.com/repos/${config.user}/${config.repo}/contents/data.json`, {
          headers: { 'Authorization': `Bearer ${config.token}` },
          cache: 'no-store'
        });
        if (res.ok) {
          const data = await res.json();
          githubSha = data.sha;
          cloudData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
          dbStatus.innerHTML = `<i class="fas fa-cloud"></i> <span>সংযুক্ত</span>`;
          dbStatus.className = 'status-badge online';
          renderTable(searchInput.value);
          updateDashboard();
        } else if (res.status === 404) {
          cloudData = [];
          dbStatus.innerHTML = `<i class="fas fa-cloud"></i> <span>খালি</span>`;
          dbStatus.className = 'status-badge online';
          renderTable(searchInput.value);
          updateDashboard();
        } else {
          throw new Error('API error');
        }
      } catch (e) {
        dbStatus.innerHTML = `<i class="fas fa-wifi-slash"></i> <span>অফলাইন</span>`;
        dbStatus.className = 'status-badge offline';
        showToast('ডাটা লোড হয়নি', 'error');
      }
    }

    // Dashboard
    function updateDashboard() {
      document.getElementById('dashboardStats').style.display = 'grid';
      const meters = cloudData.filter(d => !d.type || d.type === 'meter').length;
      const companies = cloudData.filter(d => d.type === 'company').length;
      const today = new Date().toISOString().split('T')[0];
      let todayBkash = cloudData.filter(d => d.type === 'bkash' && d.date === today)
        .reduce((sum, d) => sum + Number(d.customerTx || 0) + Number(d.srGiven || 0) + Number(d.srTaken || 0), 0);
      document.getElementById('statTotalMeters').innerText = meters;
      document.getElementById('statTotalCompanies').innerText = companies;
      document.getElementById('statTotalTx').innerText = '৳' + todayBkash;
    }

    // Render
    function renderTable(filter = '') {
      const term = filter.trim().toLowerCase();
      let items = cloudData.filter(item => {
        if (currentView === 'meter') return !item.type || item.type === 'meter';
        return item.type === currentView;
      });

      if (term) {
        items = items.filter(i => Object.values(i).some(val => String(val).toLowerCase().includes(term)));
      }

      if (currentView === 'meter') {
        thead.innerHTML = `<tr><th>#</th><th>মিটার কার্ড</th><th>গ্রাহকের নাম</th><th>ফোন নম্বর</th><th style="text-align:right;">একশন</th></tr>`;
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-bolt" style="opacity:0.3;"></i><br><br>কোনো মিটার নেই</td></tr>`;
          return;
        }
        tbody.innerHTML = items.map((i, idx) => `
          <tr>
            <td data-label="সিরিয়াল"><strong>${idx + 1}</strong></td>
            <td data-label="মিটার কার্ড"><div class="cell-content"><span>${i.meter}</span><button class="copy-btn" onclick="copyToClipboard('${i.meter}', this)"><i class="fas fa-copy"></i></button></div></td>
            <td data-label="গ্রাহকের নাম">${i.name}</td>
            <td data-label="ফোন"><div class="cell-content"><span>${i.phone}</span><button class="copy-btn" onclick="copyToClipboard('${i.phone}', this)"><i class="fas fa-copy"></i></button></div></td>
            <td data-label="একশন"><div class="action-btns"><button class="btn-icon btn-edit" onclick="openEditMeter('${i.meter}')"><i class="fas fa-pen"></i></button><button class="btn-icon btn-delete" onclick="deleteRecord('${i.id || i.meter}', 'meter')"><i class="fas fa-trash"></i></button></div></td>
          </tr>
        `).join('');
      } else if (currentView === 'company') {
        thead.innerHTML = `<tr><th>#</th><th>কোম্পানি</th><th>SR এর নাম</th><th>ফোন নম্বর</th><th style="text-align:right;">একশন</th></tr>`;
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-building" style="opacity:0.3;"></i><br><br>কোনো কোম্পানি নেই</td></tr>`;
          return;
        }
        tbody.innerHTML = items.map((i, idx) => `
          <tr>
            <td data-label="সিরিয়াল"><strong>${idx + 1}</strong></td>
            <td data-label="কোম্পানি">${i.companyName}</td>
            <td data-label="SR এর নাম">${i.srName}</td>
            <td data-label="ফোন"><div class="cell-content"><span>${i.phone}</span><button class="copy-btn" onclick="copyToClipboard('${i.phone}', this)"><i class="fas fa-copy"></i></button></div></td>
            <td data-label="একশন"><div class="action-btns"><button class="btn-icon btn-delete" onclick="deleteRecord('${i.id}', 'id')"><i class="fas fa-trash"></i></button></div></td>
          </tr>
        `).join('');
      } else if (currentView === 'bkash') {
        thead.innerHTML = `<tr><th>তারিখ</th><th>SR নিছি (In)</th><th>SR দিছি (Out)</th><th>কাস্টমার Tx</th><th>নোট</th><th style="text-align:right;">ডিলিট</th></tr>`;
        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><i class="fas fa-wallet" style="opacity:0.3;"></i><br><br>কোনো লেনদেন নেই</td></tr>`;
          return;
        }
        const reversed = [...items].reverse();
        tbody.innerHTML = reversed.map(i => `
          <tr>
            <td data-label="তারিখ"><strong>${i.date}</strong></td>
            <td data-label="SR নিছি"><span style="color:var(--success);font-weight:700;">৳${i.srGiven}</span></td>
            <td data-label="SR দিছি"><span style="color:var(--danger);font-weight:700;">৳${i.srTaken}</span></td>
            <td data-label="কাস্টমার Tx">৳${i.customerTx}</td>
            <td data-label="নোট">${i.note || '—'}</td>
            <td data-label="একশন"><div class="action-btns"><button class="btn-icon btn-delete" onclick="deleteRecord('${i.id}', 'id')"><i class="fas fa-trash"></i></button></div></td>
          </tr>
        `).join('');
      }
    }

    // --- FORMS ---
    // Meter
    document.getElementById('meterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitMeterBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> সেভ...';
      const meter = document.getElementById('meterCard').value.trim();
      if (cloudData.some(d => (!d.type || d.type === 'meter') && d.meter === meter)) {
        showToast('মিটার নম্বরটি আগে থেকেই আছে!', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ডাটাবেসে সেভ করুন';
        return;
      }
      const newItem = {
        id: 'meter_' + Date.now(),
        type: 'meter',
        meter: meter,
        name: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('phoneNumber').value.trim()
      };
      if (await syncWithGitHub([...cloudData, newItem], `Add Meter: ${newItem.name}`)) {
        showToast('মিটার সেভ হয়েছে!');
        document.getElementById('meterForm').reset();
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> ডাটাবেসে সেভ করুন';
    });

    // Company
    document.getElementById('companyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitCompBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> সেভ...';
      const newItem = {
        id: 'comp_' + Date.now(),
        type: 'company',
        companyName: document.getElementById('compName').value.trim(),
        srName: document.getElementById('srName').value.trim(),
        phone: document.getElementById('srPhone').value.trim()
      };
      if (await syncWithGitHub([...cloudData, newItem], `Add Company: ${newItem.companyName}`)) {
        showToast('কোম্পানি সেভ হয়েছে!');
        document.getElementById('companyForm').reset();
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> কোম্পানি সেভ করুন';
    });

    // bKash
    document.getElementById('bkashDate').valueAsDate = new Date();
    document.getElementById('bkashForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBkashBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> সেভ...';
      const newItem = {
        id: 'bkash_' + Date.now(),
        type: 'bkash',
        date: document.getElementById('bkashDate').value,
        srGiven: document.getElementById('bkashIn').value || 0,
        srTaken: document.getElementById('bkashOut').value || 0,
        customerTx: document.getElementById('bkashCus').value || 0,
        note: document.getElementById('bkashNote').value.trim()
      };
      if (await syncWithGitHub([...cloudData, newItem], `Add bKash Tx: ${newItem.date}`)) {
        showToast('লেনদেন সেভ হয়েছে!');
        document.getElementById('bkashIn').value = '0';
        document.getElementById('bkashOut').value = '0';
        document.getElementById('bkashCus').value = '0';
        document.getElementById('bkashNote').value = '';
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> লেনদেন সেভ করুন';
    });

    // Delete
    window.deleteRecord = async function(identifier, keyType) {
      if (!confirm('আপনি কি নিশ্চিত ডিলিট করবেন?')) return;
      const updated = cloudData.filter(d => {
        if (keyType === 'meter') return d.meter !== identifier && d.id !== identifier;
        return d.id !== identifier;
      });
      if (await syncWithGitHub(updated, `Delete record`)) {
        showToast('ডিলিট হয়েছে!');
      }
    };

    // Edit Meter
    window.openEditMeter = function(meter) {
      const item = cloudData.find(d => (!d.type || d.type === 'meter') && d.meter === meter);
      if (!item) return;
      document.getElementById('editOriginalMeter').value = item.meter;
      document.getElementById('editMeter').value = item.meter;
      document.getElementById('editName').value = item.name;
      document.getElementById('editPhone').value = item.phone;
      document.getElementById('editModal').style.display = 'flex';
    };

    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      const meter = document.getElementById('editOriginalMeter').value;
      const name = document.getElementById('editName').value.trim();
      const phone = document.getElementById('editPhone').value.trim();
      if (!name || !phone) return showToast('সব ফিল্ড পূরণ করুন!', 'error');
      const updated = cloudData.map(d => ((!d.type || d.type === 'meter') && d.meter === meter) ? { ...d, name, phone } : d);
      const btn = document.getElementById('saveEditBtn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...';
      if (await syncWithGitHub(updated, `Update Meter ${meter}`)) {
        showToast('আপডেট সফল!');
        document.getElementById('editModal').style.display = 'none';
      }
      btn.innerHTML = '<i class="fas fa-save"></i> আপডেট';
    });

    // UI Listeners
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn, .panel').forEach(el => el.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.dataset.tab).classList.add('active');
      });
    });

    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.view-btn').forEach(el => el.classList.remove('active'));
        this.classList.add('active');
        currentView = this.dataset.view;
        renderTable(searchInput.value);
      });
    });

    searchInput.addEventListener('input', (e) => renderTable(e.target.value));

    // API Modal
    document.getElementById('settingsBtn').addEventListener('click', () => {
      const c = JSON.parse(localStorage.getItem('gh_api_config')) || {};
      document.getElementById('ghUsername').value = c.user || '';
      document.getElementById('ghRepo').value = c.repo || '';
      document.getElementById('ghToken').value = c.token || '';
      document.getElementById('apiModal').style.display = 'flex';
    });
    document.getElementById('closeApiBtn').addEventListener('click', () => document.getElementById('apiModal').style.display = 'none');
    document.getElementById('saveApiBtn').addEventListener('click', () => {
      const user = document.getElementById('ghUsername').value.trim();
      const repo = document.getElementById('ghRepo').value.trim();
      const token = document.getElementById('ghToken').value.trim();
      if (!user || !repo || !token) return showToast('সব ফিল্ড পূরণ করুন!', 'error');
      localStorage.setItem('gh_api_config', JSON.stringify({ user, repo, token }));
      document.getElementById('apiModal').style.display = 'none';
      showToast('API সেভ হয়েছে!', 'success');
      loadData();
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    window.addEventListener('load', loadData);
  })();
</script>
</body>
</html>
